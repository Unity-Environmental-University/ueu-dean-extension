<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dean Extension Sandbox</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #1a1a2e; color: #e0e0e0; }
    .sandbox-layout { display: flex; height: 100vh; }
    .sandbox-controls { width: 300px; padding: 1rem; background: #16213e; border-right: 1px solid #333; overflow-y: auto; flex-shrink: 0; }
    .sandbox-preview { flex: 1; padding: 1rem; overflow-y: auto; display: flex; justify-content: center; }
    .sandbox-panel { width: 340px; background: #0f3460; border-radius: 8px; padding: 1rem; height: fit-content; }
    h1 { font-size: 1rem; margin-bottom: 1rem; color: #e94560; }
    h2 { font-size: 0.85rem; margin: 1rem 0 0.5rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; }
    label { display: block; margin: 0.3rem 0; font-size: 0.8rem; cursor: pointer; }
    select, input { background: #0f3460; color: #e0e0e0; border: 1px solid #444; padding: 0.3rem; border-radius: 4px; font-size: 0.8rem; width: 100%; margin-top: 0.2rem; }
    button.scenario-btn { display: block; width: 100%; margin: 0.3rem 0; padding: 0.4rem; background: #e94560; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
    button.scenario-btn:hover { background: #c73650; }
    .hint { font-size: 0.7rem; color: #666; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./main.tsx"></script>
</body>
</html>
